spring.application.name=todo-list

# 1. Habilitar la consola de H2
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console/

# 2. Configuración de la conexión (URL ESTÁTICA)
# Usamos 'testdb' para que la URL sea siempre jdbc:h2:mem:testdb
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# 3. Configuración de JPA / Hibernate
# 'update' crea las tablas automáticamente si no existen
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Esto evita que la base de datos se cierre si no hay conexiones activas
spring.datasource.generate-unique-name=false